<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodSoft Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0d0f14" />
</head>

<body>
    <div class="header">
        <h1>Calculator</h1>
    </div>
    <div class="calc-card">
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
            <button class="btn-mic" id="voice-btn" title="Click to speak calculation (e.g. '7 plus 8')">🎤</button>
        </div>
        <div class="btn-grid">
            <button class="btn-clear" data-action="clear">AC</button>
            <button class="btn-back" data-action="backspace">⌫</button>
            <button class="btn-op" data-action="percent">%</button>
            <button class="btn-op" data-action="operator" data-value="/">÷</button>
            <button class="btn-num" data-action="digit" data-value="7">7</button>
            <button class="btn-num" data-action="digit" data-value="8">8</button>
            <button class="btn-num" data-action="digit" data-value="9">9</button>
            <button class="btn-op" data-action="operator" data-value="*">×</button>
            <button class="btn-num" data-action="digit" data-value="4">4</button>
            <button class="btn-num" data-action="digit" data-value="5">5</button>
            <button class="btn-num" data-action="digit" data-value="6">6</button>
            <button class="btn-op" data-action="operator" data-value="-">−</button>
            <button class="btn-num" data-action="digit" data-value="1">1</button>
            <button class="btn-num" data-action="digit" data-value="2">2</button>
            <button class="btn-num" data-action="digit" data-value="3">3</button>
            <button class="btn-op" data-action="operator" data-value="+">+</button>
            <button class="btn-num btn-zero" data-action="digit" data-value="0">0</button>
            <button class="btn-num btn-dec" data-action="decimal">.</button>
            <button class="btn-eq" data-action="equals">=</button>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.log('Service Worker registration failed', err));
            });
        }
    </script>
</body>

</html>
